<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">
    <h2>Order System</h2>

    <button onclick="location.href='dashboard.html'">Back</button>

    <div class="card">
        <h3>Create Order</h3>

        <input type="text" id="tableNo" placeholder="Table Number (e.g. 1)">
        <input type="text" id="orderItem" placeholder="Item Name (must match menu)">
        <input type="number" id="quantity" placeholder="Quantity">

        <button onclick="addOrder()">Add Order</button>
    </div>

    <div class="card">
        <h3>Orders (Live)</h3>
        <ul id="orderList"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
